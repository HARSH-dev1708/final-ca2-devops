name: Node.js CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t ca2-app .

      - name: Run and Test
        run: |
          docker run -d -p 3000:3000 --name test-container ca2-app
          sleep 10
          curl http://localhost:3000/health
          docker stop test-container